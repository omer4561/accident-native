name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Create HuggingFace Dataset (if not exists)
        run: |
          curl -s -X POST "https://huggingface.co/api/repos/create" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"type":"dataset","name":"accident-reports","private":true}' || true

      - name: Inject build timestamp and secrets
        run: |
          TS=$(date -u +%s)
          sed -i "s/const APP_TS = [0-9]*/const APP_TS = $TS/" www/index.html
          sed -i "s/__APP_TS__/$TS/" www/sw.js
          GKEY="${{ secrets.GEMINI_KEY }}"
          if [ -n "$GKEY" ]; then
            sed -i "s|const GEMINI_KEY = ''|const GEMINI_KEY = '$GKEY'|" www/index.html
          fi
          HF="${{ secrets.HF_TOKEN }}"
          if [ -n "$HF" ]; then
            sed -i "s|__HF_TOKEN__|$HF|g" www/index.html
            sed -i "s|__HF_TOKEN__|$HF|g" www/admin.html
          fi
          sed -i "s|__TG_TOKEN__|${{ secrets.TELEGRAM_TOKEN }}|g" www/index.html
          sed -i "s|__TG_CHANNEL__|${{ secrets.CHANNEL_ID }}|g" www/index.html
          if [ -n "${{ secrets.EMAILJS_PUBLIC_KEY }}" ]; then
            sed -i "s|__EMAILJS_KEY__|${{ secrets.EMAILJS_PUBLIC_KEY }}|g" www/index.html
          fi
          ADMIN_PASS="${{ secrets.ADMIN_PASS }}"
          if [ -n "$ADMIN_PASS" ]; then
            ADMIN_HASH=$(echo -n "${ADMIN_PASS}acc2025" | openssl dgst -sha256 -hex | cut -d' ' -f2)
            sed -i "s|__ADMIN_PASS_HASH__|$ADMIN_HASH|g" www/index.html
            sed -i "s|__ADMIN_PASS_HASH__|$ADMIN_HASH|g" www/admin.html
          fi
          # שמור apk ו-apk_url מה-version.json הפרוס
          curl -sf "https://omer4561.github.io/accident-native/version.json" -o /tmp/v.json 2>/dev/null || echo '{}' > /tmp/v.json
          APK=$(python3 -c "import json; v=json.load(open('/tmp/v.json')); print(v.get('apk',0))" 2>/dev/null || echo 0)
          APK_URL=$(python3 -c "import json; v=json.load(open('/tmp/v.json')); print(v.get('apk_url',''))" 2>/dev/null || echo "")
          if [ -n "$APK_URL" ]; then
            echo "{\"ts\":$TS,\"apk\":$APK,\"apk_url\":\"$APK_URL\"}" > www/version.json
          else
            echo "{\"ts\":$TS,\"apk\":$APK}" > www/version.json
          fi
          echo "version.json: $(cat www/version.json)"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
