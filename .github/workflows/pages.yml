name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Inject build timestamp and Gemini key
        run: |
          TS=$(date -u +%s)
          sed -i "s/const APP_TS = [0-9]*/const APP_TS = $TS/" www/index.html
          GKEY="${{ secrets.GEMINI_KEY }}"
          if [ -n "$GKEY" ]; then
            sed -i "s|const GEMINI_KEY = ''|const GEMINI_KEY = '$GKEY'|" www/index.html
          fi
          # שמור apk ו-apk_url מה-version.json הפרוס (מעודכן רק ע"י build-apk.yml)
          curl -sf "https://omer4561.github.io/accident-native/version.json" -o /tmp/v.json 2>/dev/null || echo '{}' > /tmp/v.json
          python3 -c "
import json, sys
try:
    v = json.load(open('/tmp/v.json'))
except: v = {}
apk = v.get('apk', 0)
apk_url = v.get('apk_url', '')
ts = int(open('/tmp/ts').read().strip()) if True else 0
import os; ts = int('$TS')
out = {'ts': ts, 'apk': apk}
if apk_url: out['apk_url'] = apk_url
print(json.dumps(out))
" > www/version.json

      - name: Deploy www/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          force_orphan: true
