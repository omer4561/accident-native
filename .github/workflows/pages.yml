name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Inject build timestamp
        run: |
          TS=$(date -u +%s)
          sed -i "s/const APP_TS = [0-9]*/const APP_TS = $TS/" www/index.html
          echo "{\"ts\":$TS}" > www/version.json

      - name: Deploy www/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          force_orphan: true
