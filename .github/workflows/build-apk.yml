name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Download Tesseract.js files (offline bundle)
        run: |
          mkdir -p www/tesseract/tessdata
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" -o www/tesseract/tesseract.min.js
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js" -o www/tesseract/worker.min.js
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js" -o www/tesseract/tesseract-core.wasm.js
          curl -L "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0/heb.traineddata.gz" -o www/tesseract/tessdata/heb.traineddata.gz
          curl -L "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0/eng.traineddata.gz" -o www/tesseract/tessdata/eng.traineddata.gz

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v6
        with:
          name: accident-reporter-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            --title "דוחות תאונה v${{ github.run_number }}" \
            --notes "## התקנה
          1. הורד את קובץ \`accident-reporter.apk\`
          2. פתח אותו בטלפון Android
          3. אשר התקנה ממקורות לא ידועים"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
