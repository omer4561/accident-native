name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Set APP_BUILD, APP_TS, GEMINI_KEY and HF_TOKEN in index.html
        run: |
          sed -i "s/const APP_BUILD = [0-9]*/const APP_BUILD = ${{ github.run_number }}/" www/index.html
          sed -i "s/const APP_TS = [0-9]*/const APP_TS = ${{ github.run_number }}/" www/index.html
          GKEY="${{ secrets.GEMINI_KEY }}"
          if [ -n "$GKEY" ]; then
            sed -i "s|const GEMINI_KEY = ''|const GEMINI_KEY = '$GKEY'|" www/index.html
          fi
          HF="${{ secrets.HF_TOKEN }}"
          if [ -n "$HF" ]; then
            sed -i "s|__HF_TOKEN__|$HF|g" www/index.html
          fi
          sed -i "s|__TG_TOKEN__|${{ secrets.TELEGRAM_TOKEN }}|g" www/index.html
          sed -i "s|__TG_CHANNEL__|${{ secrets.CHANNEL_ID }}|g" www/index.html
          echo "APP_BUILD=${{ github.run_number }}, APP_TS=${{ github.run_number }}"

      - name: Download Tesseract.js files (offline bundle)
        run: |
          mkdir -p www/tesseract/tessdata
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" -o www/tesseract/tesseract.min.js
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js" -o www/tesseract/worker.min.js
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js" -o www/tesseract/tesseract-core.wasm.js
          curl -L "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0/heb.traineddata.gz" -o www/tesseract/tessdata/heb.traineddata.gz
          curl -L "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0/eng.traineddata.gz" -o www/tesseract/tessdata/eng.traineddata.gz

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Generate or load keystore
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'AccidentApp2025!' }}
        run: |
          if [ -f "accident-release.keystore" ]; then
            echo "Using existing keystore from repo"
            cp accident-release.keystore $HOME/release.keystore
          else
            echo "Generating new keystore (first time only)"
            keytool -genkeypair -v \
              -keystore $HOME/release.keystore \
              -alias accident \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" \
              -keypass "$KS_PASS" \
              -dname "CN=Accident Reporter,C=IL" -noprompt
            cp $HOME/release.keystore accident-release.keystore
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add accident-release.keystore
            git commit -m "chore: add release keystore [skip ci]"
            git push
            echo "Keystore committed to repo"
          fi

      - name: Patch build.gradle — SDK 35 + release signing
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'AccidentApp2025!' }}
        run: |
          echo "=== build.gradle BEFORE patch ==="
          cat android/app/build.gradle
          echo "=== END ==="
          python3 << 'PYEOF'
          import re, os

          ks_pass = os.environ.get('KS_PASS', 'AccidentApp2025!')

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # Upgrade SDK versions
          content = re.sub(r'compileSdkVersion \d+', 'compileSdkVersion 35', content)
          content = re.sub(r'targetSdkVersion \d+',  'targetSdkVersion 35',  content)

          # Inject signingConfigs block INSIDE android { ... }
          signing_block = f'''    signingConfigs {{
              release {{
                  storeFile     file(System.getenv("HOME") + "/release.keystore")
                  storePassword "{ks_pass}"
                  keyAlias      "accident"
                  keyPassword   "{ks_pass}"
              }}
          }}
          '''
          content = re.sub(
              r'(android\s*\{)',
              r'\1\n' + signing_block,
              content, count=1
          )

          # Wire release buildType to signingConfig
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n                signingConfig signingConfigs.release',
              content, count=1, flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle patched")
          print(open('android/app/build.gradle').read())
          PYEOF

      - name: Add network security config + media permissions
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

          # file_paths.xml — for FileProvider (APK install)
          cat > android/app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="apk_cache" path="." />
          </paths>
          EOF

          # Add permissions + FileProvider to AndroidManifest.xml
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n    <uses-permission android:name="android.permission.INTERNET" />\n</manifest>|' \
            android/app/src/main/AndroidManifest.xml

          sed -i 's/<application/<application android:requestLegacyExternalStorage="true" android:networkSecurityConfig="@xml\/network_security_config"/' \
            android/app/src/main/AndroidManifest.xml

          # הוסף FileProvider לפני </application>
          sed -i 's|</application>|    <provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml\/file_paths"\/><\/provider>\n    </application>|' \
            android/app/src/main/AndroidManifest.xml

      - name: Inject AndroidBridge into MainActivity
        run: |
          MAIN=$(find android -name "MainActivity.java" | head -1)
          if [ -z "$MAIN" ]; then echo "MainActivity.java not found"; exit 1; fi
          echo "Patching $MAIN"

          python3 << 'PYEOF'
          import re

          path = __import__('subprocess').check_output(
              ['find', 'android', '-name', 'MainActivity.java'], text=True
          ).strip().splitlines()[0]

          src = open(path).read()

          # הוסף imports
          imports = (
              'import android.content.ContentValues;\n'
              'import android.content.Intent;\n'
              'import android.database.Cursor;\n'
              'import android.media.MediaScannerConnection;\n'
              'import android.net.Uri;\n'
              'import android.os.Build;\n'
              'import android.os.Environment;\n'
              'import android.provider.MediaStore;\n'
              'import android.util.Base64;\n'
              'import android.webkit.JavascriptInterface;\n'
              'import java.io.File;\n'
              'import java.io.FileOutputStream;\n'
              'import java.io.InputStream;\n'
              'import java.io.OutputStream;\n'
          )
          src = src.replace(
              'import com.getcapacitor.BridgeActivity;',
              'import com.getcapacitor.BridgeActivity;\n' + imports
          )

          # הזרק JavaScript interface אחרי super.onCreate
          bridge_code = r"""
              getBridge().getWebView().addJavascriptInterface(new Object() {

                  /** שמור קובץ ל-Downloads/Accident_Reports */
                  @JavascriptInterface
                  public String saveFile(String base64Data, String filename, String subFolder) {
                      try {
                          byte[] data = Base64.decode(base64Data, Base64.DEFAULT);
                          String relPath = "Accident_Reports" + (subFolder != null && !subFolder.isEmpty() ? "/" + subFolder : "");
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                              ContentValues cv = new ContentValues();
                              cv.put(MediaStore.Downloads.DISPLAY_NAME, filename);
                              String mimeType = filename.endsWith(".pdf") ? "application/pdf" : "image/jpeg";
                              cv.put(MediaStore.Downloads.MIME_TYPE, mimeType);
                              cv.put(MediaStore.Downloads.RELATIVE_PATH, "Download/" + relPath);
                              Uri uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, cv);
                              if (uri == null) return "ERROR:MediaStore insert returned null";
                              try (OutputStream os = getContentResolver().openOutputStream(uri)) { os.write(data); }
                              return "OK:Download/" + relPath + "/" + filename;
                          } else {
                              File dir = new File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), relPath);
                              dir.mkdirs();
                              File file = new File(dir, filename);
                              try (FileOutputStream fos = new FileOutputStream(file)) { fos.write(data); }
                              MediaScannerConnection.scanFile(getApplicationContext(), new String[]{file.getAbsolutePath()}, null, null);
                              return "OK:" + file.getAbsolutePath();
                          }
                      } catch (Exception e) { return "ERROR:" + e.getMessage(); }
                  }

                  /** הורד APK ופתח את מתקין המערכת */
                  @JavascriptInterface
                  public void downloadAndInstall(String apkUrl) {
                      new Thread(() -> {
                          try {
                              File apkFile = new File(getCacheDir(), "update.apk");
                              // הורדה עם מעקב אחר redirects
                              java.net.URL url = new java.net.URL(apkUrl);
                              java.net.HttpURLConnection conn = (java.net.HttpURLConnection) url.openConnection();
                              conn.setInstanceFollowRedirects(true);
                              conn.setConnectTimeout(15000);
                              conn.setReadTimeout(60000);
                              int total = conn.getContentLength();
                              try (java.io.InputStream is = conn.getInputStream();
                                   FileOutputStream fos = new FileOutputStream(apkFile)) {
                                  byte[] buf = new byte[16384];
                                  int n; long read = 0;
                                  while ((n = is.read(buf)) != -1) {
                                      fos.write(buf, 0, n);
                                      read += n;
                                      if (total > 0) {
                                          final int pct = (int)(read * 100 / total);
                                          runOnUiThread(() -> getBridge().getWebView()
                                              .evaluateJavascript("window._apkProg(" + pct + ")", null));
                                      }
                                  }
                              }
                              // פתח מתקין מערכת
                              runOnUiThread(() -> {
                                  try {
                                      Intent intent = new Intent(Intent.ACTION_VIEW);
                                      Uri apkUri;
                                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                                          apkUri = androidx.core.content.FileProvider.getUriForFile(
                                              getApplicationContext(),
                                              getPackageName() + ".fileprovider", apkFile);
                                          intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                                      } else {
                                          apkUri = Uri.fromFile(apkFile);
                                      }
                                      intent.setDataAndType(apkUri, "application/vnd.android.package-archive");
                                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                      startActivity(intent);
                                  } catch (Exception e2) {
                                      getBridge().getWebView()
                                          .evaluateJavascript("window._apkErr('" + e2.getMessage().replace("'","") + "')", null);
                                  }
                              });
                          } catch (Exception e) {
                              runOnUiThread(() -> getBridge().getWebView()
                                  .evaluateJavascript("window._apkErr('" + e.getMessage().replace("'","") + "')", null));
                          }
                      }).start();
                  }

                  /** מחזיר את מספר ה-build של ה-APK המותקן — קבוע שמוזרק בזמן בנייה */
                  @JavascriptInterface
                  public int getInstalledBuild() {
                      return __APK_BUILD__;
                  }

                  /** קרא קובץ מ-Downloads והחזר base64 — לתצוגה ב-viewer הפנימי */
                  @JavascriptInterface
                  public String readFile(String filePath) {
                      try {
                          // נסה קודם MediaStore (Android 10+)
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                              String fname = new File(filePath).getName();
                              Cursor cursor = getContentResolver().query(
                                  MediaStore.Downloads.EXTERNAL_CONTENT_URI,
                                  new String[]{ MediaStore.Downloads._ID },
                                  MediaStore.Downloads.DISPLAY_NAME + "=?",
                                  new String[]{ fname }, null);
                              if (cursor != null && cursor.moveToFirst()) {
                                  long mid = cursor.getLong(0);
                                  cursor.close();
                                  Uri uri = Uri.withAppendedPath(
                                      MediaStore.Downloads.EXTERNAL_CONTENT_URI, String.valueOf(mid));
                                  try (java.io.InputStream is = getContentResolver().openInputStream(uri);
                                       java.io.ByteArrayOutputStream bos = new java.io.ByteArrayOutputStream()) {
                                      byte[] buf = new byte[8192]; int n;
                                      while ((n = is.read(buf)) != -1) bos.write(buf, 0, n);
                                      return Base64.encodeToString(bos.toByteArray(), Base64.NO_WRAP);
                                  }
                              }
                              if (cursor != null) cursor.close();
                          }
                          // fallback: נתיב ישיר
                          File f = new File(
                              Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS),
                              filePath.replaceFirst("^Download/", ""));
                          if (!f.exists()) return "ERROR:קובץ לא נמצא";
                          try (java.io.FileInputStream fis = new java.io.FileInputStream(f);
                               java.io.ByteArrayOutputStream bos = new java.io.ByteArrayOutputStream()) {
                              byte[] buf = new byte[8192]; int n;
                              while ((n = fis.read(buf)) != -1) bos.write(buf, 0, n);
                              return Base64.encodeToString(bos.toByteArray(), Base64.NO_WRAP);
                          }
                      } catch (Exception e) { return "ERROR:" + e.getMessage(); }
                  }

                  /** סרוק קובץ ל-MediaStore */
                  @JavascriptInterface
                  public void scanFile(String path) {
                      MediaScannerConnection.scanFile(getApplicationContext(), new String[]{path}, null, null);
                  }

              }, "AndroidBridge");
          """

          src = src.replace(
              'super.onCreate(savedInstanceState);',
              'super.onCreate(savedInstanceState);\n' + bridge_code
          )

          open(path, 'w').write(src)
          print("AndroidBridge injected into", path)
          PYEOF
          # הזרק את מספר ה-build לתוך getInstalledBuild()
          MAIN=$(find android -name "MainActivity.java" | head -1)
          sed -i "s/__APK_BUILD__/${{ github.run_number }}/" "$MAIN"
          echo "Injected build number ${{ github.run_number }}"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          APK=$(find android -name "app-release.apk" -type f)
          echo "APK path: $APK"
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
          $APKSIGNER verify --verbose "$APK"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v6
        with:
          name: accident-reporter-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" \
            android/app/build/outputs/apk/release/app-release.apk \
            --title "דוחות תאונה v${{ github.run_number }}" \
            --notes "## התקנה
          1. הורד את קובץ \`app-release.apk\`
          2. פתח אותו בטלפון Android
          3. אשר התקנה ממקורות לא ידועים"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump apk version in deployed version.json
        run: |
          # עדכן apk ב-version.json על gh-pages ישירות
          git clone --branch gh-pages --depth 1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/omer4561/accident-native.git /tmp/gh-pages
          cd /tmp/gh-pages
          TS=$(python3 -c "import json; print(json.load(open('version.json')).get('ts',0))" 2>/dev/null || echo 0)
          APK_URL="https://github.com/omer4561/accident-native/releases/download/v${{ github.run_number }}/app-release.apk"
          echo "{\"ts\":$TS,\"apk\":${{ github.run_number }},\"apk_url\":\"$APK_URL\"}" > version.json
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add version.json
          git commit -m "chore: bump apk to v${{ github.run_number }} [skip ci]"
          git push
