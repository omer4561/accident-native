name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Set APP_BUILD, APP_TS and GEMINI_KEY in index.html
        run: |
          sed -i "s/const APP_BUILD = [0-9]*/const APP_BUILD = ${{ github.run_number }}/" www/index.html
          sed -i "s/const APP_TS = [0-9]*/const APP_TS = ${{ github.run_number }}/" www/index.html
          GKEY="${{ secrets.GEMINI_KEY }}"
          if [ -n "$GKEY" ]; then
            sed -i "s|const GEMINI_KEY = ''|const GEMINI_KEY = '$GKEY'|" www/index.html
          fi
          echo "APP_BUILD=${{ github.run_number }}, APP_TS=${{ github.run_number }}"

      - name: Download Tesseract.js files (offline bundle)
        run: |
          mkdir -p www/tesseract/tessdata
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" -o www/tesseract/tesseract.min.js
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js" -o www/tesseract/worker.min.js
          curl -L "https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js" -o www/tesseract/tesseract-core.wasm.js
          curl -L "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0/heb.traineddata.gz" -o www/tesseract/tessdata/heb.traineddata.gz
          curl -L "https://github.com/naptha/tessdata/raw/gh-pages/4.0.0/eng.traineddata.gz" -o www/tesseract/tessdata/eng.traineddata.gz

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Generate or load keystore
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'AccidentApp2025!' }}
        run: |
          if [ -f "accident-release.keystore" ]; then
            echo "Using existing keystore from repo"
            cp accident-release.keystore $HOME/release.keystore
          else
            echo "Generating new keystore (first time only)"
            keytool -genkeypair -v \
              -keystore $HOME/release.keystore \
              -alias accident \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" \
              -keypass "$KS_PASS" \
              -dname "CN=Accident Reporter,C=IL" -noprompt
            cp $HOME/release.keystore accident-release.keystore
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git add accident-release.keystore
            git commit -m "chore: add release keystore [skip ci]"
            git push
            echo "Keystore committed to repo"
          fi

      - name: Patch build.gradle — SDK 35 + release signing
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD || 'AccidentApp2025!' }}
        run: |
          echo "=== build.gradle BEFORE patch ==="
          cat android/app/build.gradle
          echo "=== END ==="
          python3 << 'PYEOF'
          import re, os

          ks_pass = os.environ.get('KS_PASS', 'AccidentApp2025!')

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # Upgrade SDK versions
          content = re.sub(r'compileSdkVersion \d+', 'compileSdkVersion 35', content)
          content = re.sub(r'targetSdkVersion \d+',  'targetSdkVersion 35',  content)

          # Inject signingConfigs block INSIDE android { ... }
          signing_block = f'''    signingConfigs {{
              release {{
                  storeFile     file(System.getenv("HOME") + "/release.keystore")
                  storePassword "{ks_pass}"
                  keyAlias      "accident"
                  keyPassword   "{ks_pass}"
              }}
          }}
          '''
          content = re.sub(
              r'(android\s*\{)',
              r'\1\n' + signing_block,
              content, count=1
          )

          # Wire release buildType to signingConfig
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n                signingConfig signingConfigs.release',
              content, count=1, flags=re.DOTALL
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle patched")
          print(open('android/app/build.gradle').read())
          PYEOF

      - name: Add network security config + media permissions
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
              <base-config cleartextTrafficPermitted="false">
                  <trust-anchors>
                      <certificates src="system" />
                  </trust-anchors>
              </base-config>
          </network-security-config>
          EOF

          # Add media permissions + network security config to AndroidManifest.xml
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n</manifest>|' \
            android/app/src/main/AndroidManifest.xml

          sed -i 's/<application/<application android:requestLegacyExternalStorage="true" android:networkSecurityConfig="@xml\/network_security_config"/' \
            android/app/src/main/AndroidManifest.xml

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Verify APK is signed
        run: |
          APK=$(find android -name "app-release.apk" -type f)
          echo "APK path: $APK"
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name "apksigner" | sort -V | tail -1)
          $APKSIGNER verify --verbose "$APK"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v6
        with:
          name: accident-reporter-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}" \
            android/app/build/outputs/apk/release/app-release.apk \
            --title "דוחות תאונה v${{ github.run_number }}" \
            --notes "## התקנה
          1. הורד את קובץ \`app-release.apk\`
          2. פתח אותו בטלפון Android
          3. אשר התקנה ממקורות לא ידועים"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
