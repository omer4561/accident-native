<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>דוחות תאונה</title>
  <script src="tesseract/tesseract.min.js"></script>
  <script>const APP_BUILD = 12;</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
      direction: rtl;
    }

    header {
      background: #1a73e8;
      color: white;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .container {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    .upload-area {
      background: white;
      border: 2px dashed #1a73e8;
      border-radius: 12px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 16px;
      transition: background 0.2s;
      user-select: none;
    }
    .upload-area:active { background: #e8f0fe; }
    .upload-area.has-files { border-color: #34a853; background: #f0faf3; }
    .upload-area .icon { font-size: 48px; margin-bottom: 8px; }
    .upload-area .label { font-size: 16px; font-weight: bold; color: #1a73e8; }
    .upload-area.has-files .label { color: #1e8e3e; }
    .upload-area .hint { font-size: 13px; color: #666; margin-top: 4px; }
    .upload-area .count-badge {
      display: inline-block;
      background: #34a853;
      color: white;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 14px;
      font-weight: bold;
      margin-top: 8px;
    }

    .thumbs-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .thumb-item {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #ddd;
      position: relative;
      flex-shrink: 0;
    }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-more {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: #e8f0fe;
      border: 2px solid #1a73e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      color: #1a73e8;
      flex-shrink: 0;
    }

    #fileInput { display: none; }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .btn-primary { background: #1a73e8; color: white; }
    .btn-primary:disabled { background: #aaa; cursor: default; }
    .btn-success { background: #34a853; color: white; }
    .btn-sm {
      display: inline-block;
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
      margin-bottom: 0;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    .section.visible { display: block; }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #555;
      margin-bottom: 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }

    .file-progress { margin-bottom: 10px; }
    .file-name {
      font-size: 13px;
      color: #333;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .progress-bar-bg {
      background: #e0e0e0;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      background: #1a73e8;
      height: 100%;
      border-radius: 6px;
      transition: width 0.2s;
      width: 0%;
    }
    .progress-status {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .group-card {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      border-right: 4px solid #1a73e8;
    }
    .group-plate {
      font-size: 18px;
      font-weight: bold;
      color: #1a73e8;
      margin-bottom: 6px;
    }
    .group-meta {
      font-size: 13px;
      color: #555;
      margin-bottom: 10px;
    }
    .group-meta span { margin-left: 12px; }

    .pages-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .page-btn {
      flex: 1;
      min-width: 110px;
      padding: 10px;
      background: #e8f0fe;
      color: #1a73e8;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      font-weight: bold;
    }
    .page-btn:active { background: #c5d9fb; }
    .page-btn-all {
      flex: 2;
      min-width: 140px;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      font-weight: bold;
    }
    .page-btn-all:active { background: #1557b0; }

    .error-tag {
      background: #fce8e6;
      color: #c5221f;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .summary-bar {
      background: #e6f4ea;
      border-radius: 10px;
      padding: 12px 16px;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      color: #1e8e3e;
      margin-bottom: 12px;
    }

    .version-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #555;
    }
    .version-bar .ver-label { color: #888; }
    .btn-check-update {
      background: #e8f0fe;
      color: #1a73e8;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-check-update:active { background: #c5d9fb; }

    .update-banner {
      display: none;
      background: #fff8e1;
      border: 2px solid #f9a825;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 12px;
      text-align: center;
    }
    .update-banner.visible { display: block; }
    .upd-title {
      font-size: 16px;
      font-weight: bold;
      color: #e65100;
      margin-bottom: 10px;
    }
    .btn-update {
      display: inline-block;
      background: #f9a825;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
    }
    .btn-update:active { background: #e65100; }
    .upd-hint {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }

    .worker-status {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-bottom: 8px;
    }
    .worker-status.ready { color: #34a853; }
  </style>
</head>
<body>

<header>🚗 ארגון דוחות תאונה</header>

<div class="container">

  <!-- Version bar -->
  <div class="version-bar">
    <span class="ver-label">גרסה <strong id="verNum">...</strong></span>
    <button class="btn-check-update" id="checkBtn" onclick="manualCheckUpdate()">🔄 בדוק עדכונים</button>
  </div>

  <!-- Update banner (hidden until update found) -->
  <div class="update-banner" id="updateBanner">
    <div class="upd-title">🆕 עדכון זמין!</div>
    <a id="updateBtn" class="btn-update" href="#" target="_blank">⬇️ הורד עדכון עכשיו</a>
    <div class="upd-hint">התקן את ה-APK מעל הישן — אין צורך למחוק</div>
  </div>

  <div class="worker-status" id="workerStatus">⏳ מכין מנוע זיהוי...</div>

  <!-- Upload -->
  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📸</div>
    <div class="label" id="uploadLabel">בחר תמונות לעיבוד</div>
    <div class="hint">ניתן לבחור מספר תמונות בבת אחת — כולן יקובצו אוטומטית</div>
    <div id="countBadge"></div>
  </div>
  <div class="thumbs-row" id="thumbsRow"></div>

  <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.bmp">

  <button class="btn btn-primary" id="processBtn" disabled onclick="startProcessing()">
    עבד תמונות
  </button>

  <!-- Progress -->
  <div class="section" id="progressSection">
    <div class="section-title">⏳ עיבוד בתהליך</div>
    <div id="progressList"></div>
  </div>

  <!-- Results -->
  <div class="section" id="resultsSection">
    <div class="section-title">✅ תוצאות</div>
    <div id="summaryBar" class="summary-bar"></div>
    <div id="resultsList"></div>
    <div id="errorsList"></div>
  </div>

</div>

<script>
  // --- Update checker ---
  document.getElementById('verNum').textContent = APP_BUILD;

  async function checkForUpdate() {
    const checkBtn = document.getElementById('checkBtn');
    checkBtn.disabled = true;
    checkBtn.textContent = '⏳ בודק...';
    try {
      const res = await fetch(
        'https://api.github.com/repos/omer4561/accident-native/releases/latest',
        { cache: 'no-store' }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const release = await res.json();
      const latestBuild = parseInt(release.tag_name.replace('v', ''), 10);

      if (latestBuild > APP_BUILD) {
        const apkAsset = release.assets.find(a => a.name.endsWith('.apk'));
        if (apkAsset) {
          document.getElementById('updateBtn').href = apkAsset.browser_download_url;
        }
        document.getElementById('updateBanner').classList.add('visible');
        checkBtn.textContent = `🆕 v${latestBuild} זמין`;
        checkBtn.style.background = '#fce8e6';
        checkBtn.style.color = '#c5221f';
      } else {
        checkBtn.textContent = '✅ עדכני';
        checkBtn.style.background = '#e6f4ea';
        checkBtn.style.color = '#1e8e3e';
        setTimeout(() => {
          checkBtn.textContent = '🔄 בדוק עדכונים';
          checkBtn.style.background = '';
          checkBtn.style.color = '';
          checkBtn.disabled = false;
        }, 3000);
        return;
      }
    } catch(e) {
      checkBtn.textContent = '⚠️ לא זמין';
      checkBtn.style.background = '#fce8e6';
      setTimeout(() => {
        checkBtn.textContent = '🔄 בדוק עדכונים';
        checkBtn.style.background = '';
        checkBtn.disabled = false;
      }, 3000);
      return;
    }
    checkBtn.disabled = false;
  }

  function manualCheckUpdate() { checkForUpdate(); }

  // Auto-check on load
  checkForUpdate();

  const ALLOWED = ['image/jpeg', 'image/png', 'image/bmp'];
  const MAX_SIZE = 10 * 1024 * 1024;
  const MAX_OCR_PX = 1400;

  let selectedFiles = [];
  let ocrWorker = null;
  let workerReady = false;

  // --- Init worker eagerly on page load ---
  (async function initWorker() {
    try {
      ocrWorker = await Tesseract.createWorker(['heb', 'eng'], 1, {
        workerPath: 'tesseract/worker.min.js',
        langPath: 'tesseract/tessdata',
        corePath: 'tesseract/tesseract-core.wasm.js',
        cacheMethod: 'none'
      });
      workerReady = true;
      const ws = document.getElementById('workerStatus');
      ws.textContent = '✅ מנוע זיהוי מוכן';
      ws.className = 'worker-status ready';
      setTimeout(() => ws.style.display = 'none', 2000);
      if (selectedFiles.length > 0) {
        document.getElementById('processBtn').disabled = false;
      }
    } catch(e) {
      document.getElementById('workerStatus').textContent = '⚠️ שגיאה בטעינת מנוע OCR';
    }
  })();

  // --- Resize image before OCR (much faster for large photos) ---
  function resizeForOCR(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, MAX_OCR_PX / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.round(img.width * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        c.toBlob(resolve, 'image/jpeg', 0.85);
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
      img.src = url;
    });
  }

  // --- File selection ---
  document.getElementById('fileInput').addEventListener('change', function() {
    const newFiles = Array.from(this.files).filter(f =>
      ALLOWED.includes(f.type) && f.size <= MAX_SIZE
    );
    // Accumulate — don't replace existing selection
    selectedFiles = selectedFiles.concat(newFiles);
    this.value = '';
    updateUploadUI();
  });

  function updateUploadUI() {
    const area = document.getElementById('uploadArea');
    const label = document.getElementById('uploadLabel');
    const badge = document.getElementById('countBadge');
    const thumbs = document.getElementById('thumbsRow');

    if (selectedFiles.length === 0) {
      area.className = 'upload-area';
      label.textContent = 'בחר תמונות לעיבוד';
      badge.innerHTML = '';
      thumbs.innerHTML = '';
      document.getElementById('processBtn').disabled = true;
      document.getElementById('processBtn').textContent = 'עבד תמונות';
      return;
    }

    area.className = 'upload-area has-files';
    label.textContent = 'הוסף עוד תמונות';
    badge.innerHTML = `<div class="count-badge">✅ ${selectedFiles.length} תמונות נבחרו</div>`;

    // Show up to 5 thumbnails
    const MAX_THUMBS = 5;
    const show = selectedFiles.slice(0, MAX_THUMBS);
    const extra = selectedFiles.length - MAX_THUMBS;
    thumbs.innerHTML = show.map(f => {
      const url = URL.createObjectURL(f);
      return `<div class="thumb-item"><img src="${url}" onload="URL.revokeObjectURL(this.src)"></div>`;
    }).join('') + (extra > 0 ? `<div class="thumb-more">+${extra}</div>` : '');

    document.getElementById('processBtn').disabled = !workerReady;
    document.getElementById('processBtn').textContent = `🔍 עבד ${selectedFiles.length} תמונות`;
  }

  // --- Field parsing ---
  function parseFields(text) {
    const data = { date: null, license_plate: null, driver_name: null };

    const dateMatch = text.match(/(\d{1,2}[\/\.]\d{1,2}[\/\.]\d{4})/);
    if (dateMatch) data.date = dateMatch[1].replace(/\./g, '/');

    // Israeli plate: 7-8 digits, optionally with dashes
    const plateMatch = text.match(/\b(\d{2,3}[-\s]\d{2,3}[-\s]\d{2,3})\b/) ||
                       text.match(/\b(\d{7,8})\b/);
    if (plateMatch) data.license_plate = plateMatch[1].replace(/[-\s]/g, '-');

    const nameMatch = text.match(/שם[:\s]+([\u0590-\u05FF\s]{2,})/);
    if (nameMatch) data.driver_name = nameMatch[1].trim().split('\n')[0].trim();

    return data;
  }

  // --- Build filename ---
  function buildFilename(data, pageNum, multiPage, ext) {
    const plate = (data.license_plate || 'unknown_plate').replace(/[^a-zA-Z0-9\u0590-\u05FF\-]/g, '_');
    let dateStr = 'no_date';
    if (data.date) {
      const parts = data.date.split('/');
      if (parts.length === 3) dateStr = `${parts[0]}_${parts[1]}_${parts[2]}`;
    }
    const pageSuffix = multiPage ? `_עמוד${pageNum}` : '';
    return `${plate}_${dateStr}${pageSuffix}${ext}`;
  }

  // --- Convert File to base64 string ---
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // --- Save one file — native (Capacitor) or browser fallback ---
  async function saveFile(file, filename, folder) {
    const path = folder ? `דוחות_תאונה/${folder}/${filename}` : `דוחות_תאונה/${filename}`;

    if (window.Capacitor?.isNativePlatform?.()) {
      const { Filesystem, Directory } = window.Capacitor.Plugins;
      const base64 = await fileToBase64(file);
      await Filesystem.writeFile({
        path,
        data: base64,
        directory: Directory.Documents,
        recursive: true
      });
      return path;
    }

    // Browser fallback
    const url = URL.createObjectURL(file);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return filename;
  }

  // --- Save all pages of a group to the same folder ---
  async function saveGroup(plate, btn) {
    const items = window.groupsData[plate];
    if (!items) return;
    btn.disabled = true;
    btn.textContent = '⏳ שומר...';

    // Build folder from date: YYYY_MM or fallback
    const date = items[0].data.date;
    let folder = 'ללא_תאריך';
    if (date) {
      const parts = date.split('/');
      if (parts.length === 3) folder = `${parts[2]}_${parts[1]}`;
    }

    try {
      const savedPaths = await Promise.all(items.map((item, idx) => {
        const ext = '.' + item.file.name.split('.').pop().toLowerCase();
        const filename = buildFilename(item.data, idx + 1, items.length > 1, ext);
        return saveFile(item.file, filename, folder);
      }));

      const folderDisplay = window.Capacitor?.isNativePlatform?.()
        ? `Documents/דוחות_תאונה/${folder}/`
        : 'הורדות';
      btn.textContent = `✅ נשמר ב-${folderDisplay}`;
      btn.style.background = '#34a853';
    } catch(e) {
      btn.textContent = '❌ שגיאה בשמירה';
      btn.style.background = '#c5221f';
      btn.disabled = false;
      console.error('Save failed:', e);
    }
  }

  // --- Update per-file progress bar ---
  function setProgress(i, pct, statusText) {
    const bar = document.getElementById('bar_' + i);
    const status = document.getElementById('status_' + i);
    if (bar) bar.style.width = pct + '%';
    if (status) status.textContent = statusText;
  }

  // --- Main processing ---
  async function startProcessing() {
    if (!selectedFiles.length || !workerReady) return;

    document.getElementById('processBtn').disabled = true;
    document.getElementById('processBtn').textContent = 'מעבד...';

    const progressSection = document.getElementById('progressSection');
    const progressList = document.getElementById('progressList');
    progressSection.classList.add('visible');
    progressList.innerHTML = '';

    // Build progress rows
    selectedFiles.forEach((file, i) => {
      const row = document.createElement('div');
      row.className = 'file-progress';
      row.innerHTML = `
        <div class="file-name">${file.name}</div>
        <div class="progress-bar-bg"><div class="progress-bar" id="bar_${i}"></div></div>
        <div class="progress-status" id="status_${i}">ממתין...</div>
      `;
      progressList.appendChild(row);
    });

    const results = [];
    const errors = [];

    try {
      // Step 1: Resize ALL images in parallel (canvas = non-blocking, very fast)
      selectedFiles.forEach((_, i) => setProgress(i, 5, 'ממזער תמונה...'));
      const resized = await Promise.all(selectedFiles.map(f => resizeForOCR(f)));
      selectedFiles.forEach((_, i) => setProgress(i, 15, 'ממתין לזיהוי...'));

      // Step 2: OCR sequentially (single worker, but images are already small)
      for (let i = 0; i < resized.length; i++) {
        setProgress(i, 20, 'מזהה טקסט...');
        try {
          const { data: { text } } = await ocrWorker.recognize(resized[i], {}, {
            logger: m => {
              if (m.status === 'recognizing text') {
                const pct = 20 + Math.round(m.progress * 75);
                setProgress(i, pct, `זיהוי OCR: ${pct}%`);
              }
            }
          });
          setProgress(i, 100, '✅ הושלם');
          results.push({ file: selectedFiles[i], data: parseFields(text), index: i });
        } catch(e) {
          setProgress(i, 100, '❌ נכשל');
          errors.push({ file: selectedFiles[i], error: e.message || 'שגיאת OCR' });
        }
      }

    } catch(e) {
      alert('שגיאה קריטית: ' + e.message);
    }

    showResults(results, errors);

    document.getElementById('processBtn').disabled = false;
    document.getElementById('processBtn').textContent = `🔍 עבד ${selectedFiles.length} תמונות`;
  }

  // --- Show results grouped by license plate ---
  function showResults(results, errors) {
    const section = document.getElementById('resultsSection');
    const resultsList = document.getElementById('resultsList');
    const errorsList = document.getElementById('errorsList');
    const summaryBar = document.getElementById('summaryBar');
    section.classList.add('visible');
    resultsList.innerHTML = '';
    errorsList.innerHTML = '';

    summaryBar.textContent =
      `✅ עובדו ${results.length} קבצים${errors.length > 0 ? ` | ❌ ${errors.length} נכשלו` : ''}`;

    // Group by license plate — same plate = same report
    const groups = {};
    for (const r of results) {
      const plate = r.data.license_plate || 'unknown_plate';
      if (!groups[plate]) groups[plate] = [];
      groups[plate].push(r);
    }

    for (const [plate, items] of Object.entries(groups)) {
      const multiPage = items.length > 1;
      const card = document.createElement('div');
      card.className = 'group-card';

      // Pick best data across all pages (first non-null wins)
      const merged = items.reduce((acc, item) => ({
        date: acc.date || item.data.date,
        license_plate: acc.license_plate || item.data.license_plate,
        driver_name: acc.driver_name || item.data.driver_name
      }), { date: null, license_plate: null, driver_name: null });

      const dateDisplay = merged.date || 'תאריך לא זוהה';
      const driver = merged.driver_name || 'לא זוהה';

      // "Save all" button — always shown (one page or many)
      const saveAllId = `saveBtn_${plate.replace(/[^a-zA-Z0-9]/g,'_')}`;
      const saveAllBtn = `<button class="page-btn-all" id="${saveAllId}"
          onclick="saveGroup('${plate}', this)">
          💾 שמור לתיקייה${multiPage ? ` (${items.length} עמודים)` : ''}<br>
          <small style="font-size:10px;opacity:0.85">Documents/דוחות_תאונה/</small>
        </button>`;

      // Per-page individual save buttons
      let pagesHtml = '';
      items.forEach((item, idx) => {
        const pageNum = idx + 1;
        const ext = '.' + item.file.name.split('.').pop().toLowerCase();
        const filename = buildFilename(merged, pageNum, multiPage, ext);
        pagesHtml += `
          <button class="page-btn" onclick="saveFile(selectedFiles[${item.index}], '${filename}', '').then(p => this.textContent='✅ ' + ${pageNum})">
            💾 עמוד ${pageNum}<br><small style="font-size:10px;opacity:0.8">${filename}</small>
          </button>`;
      });

      card.innerHTML = `
        <div class="group-plate">🚗 ${plate}</div>
        <div class="group-meta">
          <span>📅 ${dateDisplay}</span>
          <span>👤 ${driver}</span>
          ${multiPage ? `<span>📄 ${items.length} עמודים</span>` : ''}
        </div>
        <div class="pages-row">
          ${saveAllBtn}
          ${pagesHtml}
        </div>
      `;
      resultsList.appendChild(card);
    }

    // Expose groups to downloadAll onclick handlers
    window.groupsData = {};
    for (const [plate, items] of Object.entries(groups)) {
      const merged = items.reduce((acc, item) => ({
        date: acc.date || item.data.date,
        license_plate: acc.license_plate || item.data.license_plate,
        driver_name: acc.driver_name || item.data.driver_name
      }), { date: null, license_plate: null, driver_name: null });
      window.groupsData[plate] = items.map((item, idx) => ({
        ...item,
        data: merged
      }));
    }

    errors.forEach(e => {
      const div = document.createElement('div');
      div.className = 'error-tag';
      div.textContent = `❌ ${e.file.name}: ${e.error}`;
      errorsList.appendChild(div);
    });

    section.scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
