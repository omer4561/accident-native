<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>דוחות תאונה</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --card: #161b22; --border: #30363d;
      --accent: #1f6feb; --green: #238636; --red: #da3633;
      --warn: #d29922; --text: #e6edf3; --muted: #8b949e;
      --r: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

    header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 18px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 17px; font-weight: 700; }
    .badge { margin-right: auto; background: var(--green); color: #fff; font-size: 12px; padding: 2px 10px; border-radius: 20px; }

    .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
    .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: color .2s; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .page { display: none; padding: 14px; max-width: 500px; margin: 0 auto; }
    .page.active { display: block; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 14px; }
    .card h2 { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }

    /* photo slots */
    .drop-zone { border: 2px dashed var(--border); border-radius: var(--r); padding: 24px 16px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 12px; }
    .drop-zone:active, .drop-zone.drag { border-color: var(--accent); background: rgba(31,111,235,.06); }
    .drop-zone .dz-icon { font-size: 36px; margin-bottom: 6px; }
    .drop-zone .dz-text { font-size: 14px; color: var(--muted); }
    .drop-zone .dz-count { font-size: 13px; color: var(--green); margin-top: 4px; font-weight: 600; }
    .thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-bottom: 12px; }
    .thumb { position: relative; aspect-ratio: 3/4; border-radius: 8px; overflow: hidden; border: 2px solid var(--green); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .thumb .del { position: absolute; top: 3px; left: 3px; background: var(--red); border: none; border-radius: 50%; width: 22px; height: 22px; color: #fff; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .thumb .num { position: absolute; bottom: 3px; right: 3px; background: rgba(0,0,0,.6); color: #fff; font-size: 11px; padding: 1px 5px; border-radius: 6px; }

    /* buttons */
    .btn { width: 100%; padding: 13px; border: none; border-radius: var(--r); font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; margin-bottom: 8px; transition: opacity .15s, transform .1s; }
    .btn:active { transform: scale(.97); opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-blue  { background: var(--accent); color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-gray  { background: var(--card); color: var(--text); border: 1px solid var(--border); }

    /* progress */
    .prog { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 8px 0; display: none; }
    .prog.show { display: block; }
    .prog-bar { height: 100%; width: 0; background: var(--accent); transition: width .3s; }

    /* log */
    .log { font-size: 13px; min-height: 18px; margin-top: 6px; padding: 6px 0; }
    .log.ok  { color: #3fb950; }
    .log.err { color: var(--red); }
    .log.inf { color: var(--warn); }

    /* form fields */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .field input, .field select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text);
      font-size: 14px; font-family: inherit;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

    /* report list */
    .report-item { padding: 12px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .report-item:last-child { border-bottom: none; }
    .report-item .ico { font-size: 24px; }
    .report-item .info { flex: 1; }
    .report-item .info .title { font-size: 14px; font-weight: 600; }
    .report-item .info .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .report-item .folder-tag { font-size: 11px; background: rgba(31,111,235,.15); color: var(--accent); padding: 2px 8px; border-radius: 10px; white-space: nowrap; }

    .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
    .empty span { font-size: 48px; display: block; margin-bottom: 10px; }

    .setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .setting-row label { flex: 1; font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <span style="font-size:26px">🚗</span>
  <h1>דוחות תאונה</h1>
  <span class="badge" id="badge">0</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="tab('add')">📸 הוספה</div>
  <div class="tab" onclick="tab('list')">📁 דוחות</div>
  <div class="tab" onclick="tab('cfg')">⚙️ הגדרות</div>
</div>

<!-- הוספה -->
<div class="page active" id="pg-add">

  <div class="card">
    <h2>📷 צלם את הדוח</h2>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none" onchange="gotPhotos(this)">
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="dz-icon">📷</div>
      <div class="dz-text">לחץ לבחירת תמונות (אחת או יותר)</div>
      <div class="dz-count" id="dzCount"></div>
    </div>
    <div class="thumbs" id="thumbs"></div>
    <button class="btn btn-blue" id="ocrBtn" onclick="doOCR()" disabled>🔍 זהה נתונים</button>
    <div class="prog" id="prog"><div class="prog-bar" id="progBar"></div></div>
    <div class="log" id="logEl"></div>
  </div>

  <div class="card" id="formCard" style="display:none">
    <h2>📋 נתוני הדוח — ערוך אם צריך</h2>
    <div class="field"><label>לוחית רישוי</label><input id="F_plate" placeholder="לא זוהה"></div>
    <div class="field"><label>תאריך התאונה</label><input type="date" id="F_date"></div>
    <div class="field"><label>סוג תאונה</label>
      <select id="F_type">
        <option value="">לא ידוע</option>
        <option value="צבא-צבא">צבא-צבא</option>
        <option value="צבא-אזרח">צבא-אזרח</option>
        <option value="צבא-עצמי">צבא-עצמי</option>
      </select>
    </div>
    <div class="field"><label>שם נהג</label><input id="F_driver" placeholder="לא זוהה"></div>
    <div class="field"><label>הערות</label><input id="F_notes" placeholder="אופציונלי"></div>
    <button class="btn btn-green" onclick="save()">💾 שמור דוח לתיקייה</button>
  </div>

</div>

<!-- רשימת דוחות -->
<div class="page" id="pg-list">
  <div class="card">
    <h2>📁 תיקיית שמירה</h2>
    <p style="font-size:13px;color:var(--muted);margin-bottom:10px">
      הקבצים נשמרים ב: <b id="saveDirLabel" style="color:var(--text)">טוען...</b>
    </p>
  </div>
  <div class="card">
    <h2>📄 כל הדוחות</h2>
    <div id="reportList"><div class="empty"><span>📭</span>לא נשמרו דוחות עדיין</div></div>
  </div>
</div>

<!-- הגדרות -->
<div class="page" id="pg-cfg">
  <div class="card">
    <h2>⚙️ הגדרות שמירה</h2>
    <div class="setting-row">
      <label>פורמט שם קובץ</label>
      <select id="nameFmt" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;" onchange="saveCfg()">
        <option value="plate_date">לוחית_תאריך</option>
        <option value="date_plate">תאריך_לוחית</option>
      </select>
    </div>
    <div class="setting-row">
      <label>תיקיות לפי</label>
      <select id="folderFmt" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;" onchange="saveCfg()">
        <option value="ym">שנה/חודש</option>
        <option value="y">שנה בלבד</option>
        <option value="flat">ללא תת-תיקיות</option>
      </select>
    </div>
  </div>
  <div class="card">
    <h2>🗑️ ניקוי</h2>
    <button class="btn btn-gray" onclick="clearAll()">מחק את כל ההיסטוריה</button>
  </div>
  <div class="card">
    <h2>ℹ️ גרסה</h2>
    <p style="font-size:13px;color:var(--muted)">דוחות תאונה v1.0</p>
  </div>
</div>

<!-- Tesseract — קבצים מקומיים בתוך האפליקציה -->
<script src="tesseract/tesseract.min.js"></script>

<script>
// ================================================================
// STATE
// ================================================================
let photos = [];
const HEB = ['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
let reports = JSON.parse(localStorage.getItem('acc_reports')||'[]');
let cfg     = JSON.parse(localStorage.getItem('acc_cfg')||'{"nameFmt":"plate_date","folderFmt":"ym"}');

// Capacitor plugins
let CapFS;
(async () => {
  if (window.Capacitor) {
    const { Filesystem, Directory } = await import('./capacitor-filesystem.js').catch(()=>({}));
    CapFS = { Filesystem, Directory };
    document.getElementById('saveDirLabel').textContent = 'Documents/דוחות_תאונה';
  } else {
    document.getElementById('saveDirLabel').textContent = 'הורדות (Downloads)';
  }
  loadCfg();
  renderList();
  updateBadge();
})();

// ================================================================
// TABS
// ================================================================
function tab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=> t.classList.toggle('active', ['add','list','cfg'][i]===name));
  document.querySelectorAll('.page').forEach(p=> p.classList.remove('active'));
  document.getElementById('pg-'+name).classList.add('active');
  if (name==='list') renderList();
}

// ================================================================
// PHOTOS
// ================================================================
function gotPhotos(inp) {
  const files = Array.from(inp.files);
  if (!files.length) return;
  photos = photos.concat(files);
  renderThumbs();
  document.getElementById('ocrBtn').disabled = false;
  document.getElementById('fileInput').value = '';
}

function delPhoto(e, idx) {
  e.stopPropagation();
  photos.splice(idx, 1);
  renderThumbs();
  if (!photos.length) document.getElementById('ocrBtn').disabled = true;
}

function renderThumbs() {
  const container = document.getElementById('thumbs');
  const count = document.getElementById('dzCount');
  count.textContent = photos.length ? `${photos.length} תמונות נבחרו` : '';
  container.innerHTML = photos.map((f, i) => `
    <div class="thumb">
      <img src="${URL.createObjectURL(f)}">
      <button class="del" onclick="delPhoto(event,${i})">✕</button>
      <span class="num">עמ' ${i+1}</span>
    </div>`).join('');
}

// ================================================================
// OCR
// ================================================================
async function resizeForOCR(file, maxPx = 1400) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = img.width * scale; c.height = img.height * scale;
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(b => res(b), 'image/jpeg', 0.85);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function doOCR() {
  const btn = document.getElementById('ocrBtn');
  btn.disabled = true;
  log('⏳ מריץ זיהוי טקסט...', 'inf');
  prog(5);

  try {
    const worker = await Tesseract.createWorker('heb', 1, {
      workerPath: 'tesseract/worker.min.js',
      corePath:   'tesseract/tesseract-core.wasm.js',
      langPath:   'tesseract/tessdata',
      logger: m => {
        if (m.status === 'recognizing text') prog(20 + m.progress * 60 | 0);
      }
    });
    await worker.setParameters({ tessedit_pageseg_mode: '6' });

    let txt = '';
    for (let i = 0; i < photos.length; i++) {
      log(`📄 מזהה עמוד ${i+1} מתוך ${photos.length}...`, 'inf');
      prog(10 + (i / photos.length) * 10 | 0);
      const resized = await resizeForOCR(photos[i]);
      const r = await worker.recognize(resized);
      txt += r.data.text + '\n';
    }

    await worker.terminate();
    prog(100);
    fillForm(parse(txt));
    log('✅ זיהוי הושלם — בדוק ותקן אם נדרש', 'ok');
  } catch(err) {
    log('⚠️ OCR נכשל — מלא ידנית', 'err');
    fillForm({});
  }

  document.getElementById('formCard').style.display = 'block';
  btn.disabled = false;
}

// ================================================================
// PARSE
// ================================================================
function parse(txt) {
  const d = {};
  // תאריך
  for (const rx of [/\b(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})\b/, /\b(\d{4})[\/.\-](\d{1,2})[\/.\-](\d{1,2})\b/]) {
    const m = txt.match(rx);
    if (m) {
      try {
        let dd,mo,yy;
        if (m[1].length===4) { yy=+m[1]; mo=+m[2]; dd=+m[3]; } else { dd=+m[1]; mo=+m[2]; yy=+m[3]; }
        if (mo>=1&&mo<=12&&dd>=1&&dd<=31&&yy>=2000&&yy<=2100) { d.date=`${yy}-${pad(mo)}-${pad(dd)}`; break; }
      } catch(e){}
    }
  }
  // לוחית
  for (const rx of [/\b(\d{2,3}[-\s]\d{2,3}[-\s]\d{2,3})\b/, /\b(\d{7,8})\b/]) {
    const m = txt.match(rx); if (m) { d.plate=m[1].trim(); break; }
  }
  // סוג תאונה
  if (/צבא[\s\W]*צבא/.test(txt))    d.type='צבא-צבא';
  else if (/צבא[\s\W]*אזרח/.test(txt)) d.type='צבא-אזרח';
  else if (/צבא[\s\W]*עצמ/.test(txt))  d.type='צבא-עצמי';
  // שם
  for (const line of txt.split('\n')) {
    if (/שם|נהג/.test(line)) {
      const p = line.split(/[:\-–]/);
      if (p[1]?.trim().length>=2) { d.driver=p[1].trim(); break; }
    }
  }
  return d;
}

function fillForm(d) {
  document.getElementById('F_plate').value  = d.plate  || '';
  document.getElementById('F_date').value   = d.date   || today();
  document.getElementById('F_type').value   = d.type   || '';
  document.getElementById('F_driver').value = d.driver || '';
}

// ================================================================
// SAVE
// ================================================================
async function save() {
  const plate  = san(document.getElementById('F_plate').value  || 'לא_זוהה');
  const dateV  = document.getElementById('F_date').value || today();
  const type   = document.getElementById('F_type').value;
  const driver = document.getElementById('F_driver').value;
  const notes  = document.getElementById('F_notes').value;

  const dt = new Date(dateV);
  const y=dt.getFullYear(), mo=dt.getMonth()+1, dd=String(dt.getDate()).padStart(2,'0');
  const dateTag = `${dd}_${pad(mo)}_${y}`;

  const nf = cfg.nameFmt;
  let base = nf==='plate_date' ? `${plate}_${dateTag}` : `${dateTag}_${plate}`;
  if (type) base += `_${san(type)}`;

  let folder = '';
  if (cfg.folderFmt==='ym') folder = `${y}/${HEB[mo]}_${pad(mo)}_${y}`;
  else if (cfg.folderFmt==='y') folder = `${y}`;

  const saved = [];
  for (let i = 0; i < photos.length; i++) {
    const ext = photos[i].name.split('.').pop()||'jpg';
    const fname = `${base}_עמוד${i+1}.${ext}`;
    await writeFile(photos[i], fname, folder);
    saved.push({ name: fname, folder: folder||'/' });
  }

  // מטא-דאטה
  const meta = buildMeta({ plate, date: dateV, type, driver, notes });
  await writeText(`${base}_פרטים.txt`, meta, folder);

  const entry = { id:Date.now(), plate: document.getElementById('F_plate').value||'לא זוהה',
    date: dateV, type, driver, folder: folder||'/', files: saved };
  reports.unshift(entry);
  if (reports.length>500) reports = reports.slice(0,500);
  localStorage.setItem('acc_reports', JSON.stringify(reports));
  updateBadge();

  log(`✅ נשמר בתיקייה: ${folder||'/'}`, 'ok');
  document.getElementById('formCard').style.display = 'none';
  photos = [];
  renderThumbs();
  document.getElementById('ocrBtn').disabled = true;
  document.getElementById('F_notes').value = '';
}

async function writeFile(file, name, folder) {
  const buf = await file.arrayBuffer();
  const blob = new Blob([buf], { type: file.type });

  // Capacitor — שמירה לתיקיית Documents האמיתית
  if (window.Capacitor?.isNativePlatform?.()) {
    try {
      const { Filesystem, Directory } = window.Capacitor.Plugins;
      const path = folder ? `דוחות_תאונה/${folder}/${name}` : `דוחות_תאונה/${name}`;
      const reader = new FileReader();
      const b64 = await new Promise(res => {
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
      await Filesystem.writeFile({ path, data: b64, directory: Directory.Documents, recursive: true });
      return;
    } catch(e) { console.warn('Capacitor write failed:', e); }
  }

  // Browser fallback — הורדה
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: name });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function writeText(name, content, folder) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  if (window.Capacitor?.isNativePlatform?.()) {
    try {
      const { Filesystem, Directory } = window.Capacitor.Plugins;
      const path = folder ? `דוחות_תאונה/${folder}/${name}` : `דוחות_תאונה/${name}`;
      await Filesystem.writeFile({ path, data: btoa(unescape(encodeURIComponent(content))), directory: Directory.Documents, recursive: true });
      return;
    } catch(e) {}
  }
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href: url, download: name });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function buildMeta(d) {
  return [
    '=== פרטי דוח תאונה ===',
    d.plate   ? `לוחית רישוי: ${d.plate}`   : '',
    d.date    ? `תאריך: ${fmtDate(d.date)}`  : '',
    d.type    ? `סוג תאונה: ${d.type}`       : '',
    d.driver  ? `נהג: ${d.driver}`           : '',
    d.notes   ? `הערות: ${d.notes}`         : '',
    '',
    `נוצר: ${new Date().toLocaleString('he-IL')}`,
  ].filter(l=>l!=='' || l==='').join('\n');
}

// ================================================================
// LIST
// ================================================================
function renderList() {
  const el = document.getElementById('reportList');
  if (!reports.length) {
    el.innerHTML = '<div class="empty"><span>📭</span>לא נשמרו דוחות עדיין</div>';
    return;
  }
  el.innerHTML = reports.map(r => `
    <div class="report-item">
      <span class="ico">📄</span>
      <div class="info">
        <div class="title">${r.plate} ${r.type ? '· ' + r.type : ''}</div>
        <div class="sub">📅 ${fmtDate(r.date)} ${r.driver ? '· ' + r.driver : ''}</div>
      </div>
      <span class="folder-tag">📁 ${r.folder}</span>
    </div>`).join('');
}

// ================================================================
// CONFIG
// ================================================================
function loadCfg() {
  document.getElementById('nameFmt').value  = cfg.nameFmt   || 'plate_date';
  document.getElementById('folderFmt').value = cfg.folderFmt || 'ym';
}
function saveCfg() {
  cfg.nameFmt   = document.getElementById('nameFmt').value;
  cfg.folderFmt = document.getElementById('folderFmt').value;
  localStorage.setItem('acc_cfg', JSON.stringify(cfg));
}
function clearAll() {
  if (!confirm('למחוק את כל ההיסטוריה?')) return;
  reports = []; localStorage.removeItem('acc_reports');
  updateBadge(); renderList();
}

// ================================================================
// UTILS
// ================================================================
function san(s){ return (s||'').replace(/[^\w\u0590-\u05FF\-]/g,'_').slice(0,30).replace(/^_+|_+$/g,'')||'unknown'; }
function pad(n){ return String(n).padStart(2,'0'); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if (!iso) return ''; const [y,m,d]=iso.split('-'); return `${d}/${m}/${y}`; }
function updateBadge(){ document.getElementById('badge').textContent = reports.length + ' דוחות'; }
function log(msg,cls=''){ const e=document.getElementById('logEl'); e.textContent=msg; e.className='log '+cls; }
function prog(pct){
  const w=document.getElementById('prog'), b=document.getElementById('progBar');
  w.classList.add('show'); b.style.width=pct+'%';
  if(pct>=100) setTimeout(()=>w.classList.remove('show'),800);
}

updateBadge();
