<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>דוחות תאונה</title>
  <script src="https://omer4561.github.io/accident-native/tesseract/tesseract.min.js"></script>
  <script>const APP_TS = 0;</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; direction: rtl; }

    header {
      background: #1a73e8; color: white;
      padding: 0 16px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    header .title { font-size: 18px; font-weight: bold; }
    .menu-btn {
      background: none; border: none; color: white;
      font-size: 22px; cursor: pointer; padding: 8px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .menu-btn span { display: block; width: 22px; height: 2px; background: white; border-radius: 2px; }

    .container { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* ---- History overlay ---- */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
    }
    .overlay.open { display: flex; }
    .side-panel {
      background: white; width: min(360px, 92vw);
      height: 100%; overflow-y: auto;
      display: flex; flex-direction: column;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .panel-header {
      background: #1a73e8; color: white;
      padding: 16px; font-size: 16px; font-weight: bold;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-tabs {
      display: flex; border-bottom: 2px solid #eee; flex-shrink: 0;
    }
    .panel-tab {
      flex: 1; padding: 12px; text-align: center; font-size: 13px;
      font-weight: bold; cursor: pointer; color: #888; border: none; background: none;
    }
    .panel-tab.active { color: #1a73e8; border-bottom: 2px solid #1a73e8; margin-bottom: -2px; }
    .panel-content { padding: 12px; flex: 1; }

    .report-item {
      background: #f8f9fa; border-radius: 10px; padding: 12px;
      margin-bottom: 10px; border-right: 4px solid #1a73e8;
    }
    .report-item.trashed { border-color: #e53935; opacity: 0.8; }
    .report-item .ri-plate { font-weight: bold; color: #1a73e8; font-size: 15px; margin-bottom: 4px; }
    .report-item .ri-meta { font-size: 12px; color: #666; margin-bottom: 8px; }
    .report-item .ri-files { font-size: 11px; color: #888; margin-bottom: 8px; }
    .ri-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .ri-btn {
      padding: 5px 10px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: bold; cursor: pointer;
    }
    .ri-btn-del { background: #fce8e6; color: #c5221f; }
    .ri-btn-restore { background: #e6f4ea; color: #1e8e3e; }
    .ri-btn-perm { background: #c5221f; color: white; }
    .ri-btn-open { background: #e8f0fe; color: #1a73e8; }
    .empty-msg { text-align: center; color: #aaa; padding: 32px 16px; font-size: 14px; }

    /* ---- Upload ---- */
    .upload-area {
      background: white; border: 2px dashed #1a73e8;
      border-radius: 12px; padding: 28px 20px;
      text-align: center; cursor: pointer;
      margin-bottom: 12px; transition: background 0.2s; user-select: none;
    }
    .upload-area:active { background: #e8f0fe; }
    .upload-area.has-files { border-color: #34a853; background: #f0faf3; }
    .upload-area .icon { font-size: 44px; margin-bottom: 6px; }
    .upload-area .label { font-size: 16px; font-weight: bold; color: #1a73e8; }
    .upload-area.has-files .label { color: #1e8e3e; }
    .upload-area .hint { font-size: 13px; color: #666; margin-top: 4px; }
    .count-badge {
      display: inline-block; background: #34a853; color: white;
      border-radius: 20px; padding: 4px 14px;
      font-size: 14px; font-weight: bold; margin-top: 8px;
    }
    .thumbs-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .thumb-item { width: 64px; height: 64px; border-radius: 8px; overflow: hidden; border: 2px solid #ddd; flex-shrink: 0; }
    .thumb-item img { width: 100%; height: 100%; object-fit: cover; }
    .thumb-more {
      width: 64px; height: 64px; border-radius: 8px;
      background: #e8f0fe; border: 2px solid #1a73e8;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: bold; color: #1a73e8; flex-shrink: 0;
    }
    #fileInput { display: none; }

    .btn {
      display: block; width: 100%; padding: 14px;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px;
    }
    .btn-primary { background: #1a73e8; color: white; }
    .btn-primary:disabled { background: #aaa; cursor: default; }

    .section { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; display: none; }
    .section.visible { display: block; }
    .section-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }

    .file-progress { margin-bottom: 10px; }
    .file-name { font-size: 13px; color: #333; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .progress-bar-bg { background: #e0e0e0; border-radius: 6px; height: 8px; overflow: hidden; }
    .progress-bar { background: #1a73e8; height: 100%; border-radius: 6px; transition: width 0.2s; width: 0%; }
    .progress-status { font-size: 11px; color: #888; margin-top: 2px; }

    .group-card { background: #f8f9fa; border-radius: 10px; padding: 14px; margin-bottom: 12px; border-right: 4px solid #1a73e8; }
    .group-plate { font-size: 18px; font-weight: bold; color: #1a73e8; margin-bottom: 4px; }
    .group-meta { font-size: 13px; color: #555; margin-bottom: 10px; }
    .group-meta span { margin-left: 12px; }
    .pages-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .page-btn {
      flex: 1; min-width: 100px; padding: 10px;
      background: #e8f0fe; color: #1a73e8;
      border: none; border-radius: 8px; font-size: 13px;
      cursor: pointer; text-align: center; font-weight: bold;
    }
    .page-btn-all {
      flex: 2; min-width: 140px; padding: 10px;
      background: #1a73e8; color: white;
      border: none; border-radius: 8px; font-size: 13px;
      cursor: pointer; text-align: center; font-weight: bold;
    }
    .error-tag { background: #fce8e6; color: #c5221f; border-radius: 8px; padding: 8px 12px; font-size: 13px; margin-bottom: 8px; }
    .summary-bar { background: #e6f4ea; border-radius: 10px; padding: 12px 16px; text-align: center; font-size: 15px; font-weight: bold; color: #1e8e3e; margin-bottom: 12px; }
    .worker-status { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 8px; }
    .worker-status.ready { color: #34a853; }

    /* ---- Settings overlay ---- */
    .settings-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 300;
      align-items: center; justify-content: center;
    }
    .settings-overlay.open { display: flex; }
    .settings-box {
      background: white; border-radius: 16px;
      width: min(340px, 90vw); padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .settings-title {
      font-size: 17px; font-weight: bold; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .settings-row { margin-bottom: 20px; }
    .settings-row label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; }
    .settings-row input[type=range] { width: 100%; accent-color: #1a73e8; }
    .settings-val { font-size: 22px; font-weight: bold; color: #1a73e8; text-align: center; margin-top: 6px; }
    .settings-save {
      width: 100%; padding: 12px;
      background: #1a73e8; color: white;
      border: none; border-radius: 10px; font-size: 15px;
      cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>

<header>
  <div class="title">🚗 ארגון דוחות תאונה</div>
  <div style="display:flex;gap:4px;align-items:center">
    <button onclick="openSettings()" title="הגדרות"
      style="background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:8px">⚙️</button>
    <button class="menu-btn" onclick="openHistory()" title="היסטוריה">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="settingsOverlayClick(event)">
  <div class="settings-box">
    <div class="settings-title">
      ⚙️ הגדרות
      <button onclick="closeSettings()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#555">✕</button>
    </div>
    <div class="settings-row">
      <label>זמן המתנה בין העלאה להעלאה</label>
      <input type="range" id="delaySlider" min="3" max="60" step="1" oninput="updateDelayLabel(this.value)">
      <div class="settings-val"><span id="delayLabel">10</span> שניות</div>
    </div>
    <button class="settings-save" onclick="saveSettings()">שמור</button>
  </div>
</div>

<!-- History side panel -->
<div class="overlay" id="historyOverlay" onclick="overlayClick(event)">
  <div class="side-panel">
    <div class="panel-header">
      <span>📁 היסטוריה</span>
      <button onclick="closeHistory()" style="background:none;border:none;color:white;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" id="tabReports" onclick="switchTab('reports')">📋 דוחות</button>
      <button class="panel-tab" id="tabTrash" onclick="switchTab('trash')">🗑️ סל מחזור</button>
    </div>
    <div class="panel-content" id="panelContent"></div>
  </div>
</div>

<div class="container">
  <div class="worker-status" id="workerStatus">⏳ מכין מנוע זיהוי...</div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📸</div>
    <div class="label" id="uploadLabel">בחר תמונות לעיבוד</div>
    <div class="hint">ניתן לבחור מספר תמונות בבת אחת — כולן יקובצו אוטומטית</div>
    <div id="countBadge"></div>
  </div>
  <div class="thumbs-row" id="thumbsRow"></div>
  <input type="file" id="fileInput" multiple accept="image/*">

  <button class="btn btn-primary" id="processBtn" disabled onclick="startProcessing()">עבד תמונות</button>

  <div class="section" id="progressSection">
    <div class="section-title">⏳ עיבוד בתהליך</div>
    <div id="progressList"></div>
  </div>

  <div class="section" id="resultsSection">
    <div class="section-title">✅ תוצאות</div>
    <div id="summaryBar" class="summary-bar"></div>
    <div id="resultsList"></div>
    <div id="errorsList"></div>
  </div>
</div>

<script>
  // ===================== SETTINGS =====================
  let resetDelay = parseInt(localStorage.getItem('resetDelay') || '10', 10);
  let resetTimer = null;

  function openSettings() {
    document.getElementById('delaySlider').value = resetDelay;
    document.getElementById('delayLabel').textContent = resetDelay;
    document.getElementById('settingsOverlay').classList.add('open');
  }
  function closeSettings() { document.getElementById('settingsOverlay').classList.remove('open'); }
  function settingsOverlayClick(e) { if (e.target === e.currentTarget) closeSettings(); }
  function updateDelayLabel(v) { document.getElementById('delayLabel').textContent = v; }
  function saveSettings() {
    resetDelay = parseInt(document.getElementById('delaySlider').value, 10);
    localStorage.setItem('resetDelay', resetDelay);
    closeSettings();
  }

  function startResetTimer() {
    if (resetTimer) clearTimeout(resetTimer);
    resetTimer = setTimeout(resetUI, resetDelay * 1000);
  }

  function resetUI() {
    selectedFiles = [];
    document.getElementById('thumbsRow').innerHTML = '';
    document.getElementById('countBadge').innerHTML = '';
    document.getElementById('uploadLabel').textContent = 'בחר תמונות לעיבוד';
    document.getElementById('uploadArea').classList.remove('has-files');
    document.getElementById('progressSection').classList.remove('visible');
    document.getElementById('resultsSection').classList.remove('visible');
    document.getElementById('resultsList').innerHTML = '';
    document.getElementById('errorsList').innerHTML = '';
    document.getElementById('progressList').innerHTML = '';
    const btn = document.getElementById('processBtn');
    btn.disabled = true;
    btn.textContent = 'עבד תמונות';
    btn.style.background = '';
    window.groupsData = {};
  }

  // ===================== UPDATE CHECK =====================
  (async function checkUpdate() {
    if (!APP_TS) return;
    try {
      const res = await fetch('https://omer4561.github.io/accident-native/index.html', { cache: 'no-store' });
      const html = await res.text();
      const m = html.match(/const APP_TS = (\d+)/);
      if (m && parseInt(m[1], 10) > APP_TS) {
        if (confirm('🆕 יש עדכון לאפליקציה!\nלחץ אישור כדי לטעון עכשיו.')) location.reload(true);
      }
    } catch(e) {}
  })();

  // ===================== HISTORY (localStorage) =====================
  let history = JSON.parse(localStorage.getItem('acc_history') || '[]');
  let currentTab = 'reports';

  function saveHistory() { localStorage.setItem('acc_history', JSON.stringify(history)); }

  function addReportToHistory(plate, date, driver, filePaths, folder) {
    history.unshift({
      id: Date.now(),
      plate: plate || 'unknown',
      date: date || '',
      driver: driver || '',
      files: filePaths,
      folder: folder,
      trashed: false,
      savedAt: new Date().toLocaleString('he-IL')
    });
    if (history.length > 200) history = history.slice(0, 200);
    saveHistory();
  }

  function openHistory() {
    document.getElementById('historyOverlay').classList.add('open');
    renderPanel();
  }
  function closeHistory() { document.getElementById('historyOverlay').classList.remove('open'); }
  function overlayClick(e) { if (e.target === e.currentTarget) closeHistory(); }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabReports').className = 'panel-tab' + (tab === 'reports' ? ' active' : '');
    document.getElementById('tabTrash').className = 'panel-tab' + (tab === 'trash' ? ' active' : '');
    renderPanel();
  }

  function renderPanel() {
    const content = document.getElementById('panelContent');
    const items = history.filter(r => currentTab === 'trash' ? r.trashed : !r.trashed);

    if (items.length === 0) {
      content.innerHTML = `<div class="empty-msg">${currentTab === 'trash' ? '🗑️ הסל ריק' : '📭 אין דוחות שמורים'}</div>`;
      return;
    }

    content.innerHTML = items.map(r => {
      const plateDisplay = r.plate === 'unknown' ? 'לוחית לא זוהתה' : r.plate;
      const dateDisplay = r.date || 'תאריך לא זוהה';
      const filesDisplay = r.files ? r.files.map(f => f.split('/').pop()).join(', ') : '';

      if (r.trashed) {
        return `<div class="report-item trashed">
          <div class="ri-plate">🚗 ${plateDisplay}</div>
          <div class="ri-meta">📅 ${dateDisplay} &nbsp; 🕐 ${r.savedAt}</div>
          <div class="ri-files">${filesDisplay}</div>
          <div class="ri-actions">
            <button class="ri-btn ri-btn-restore" onclick="restoreReport(${r.id})">♻️ שחזר</button>
            <button class="ri-btn ri-btn-perm" onclick="permDelete(${r.id})">🗑️ מחק לצמיתות</button>
          </div>
        </div>`;
      } else {
        return `<div class="report-item">
          <div class="ri-plate">🚗 ${plateDisplay}</div>
          <div class="ri-meta">📅 ${dateDisplay} &nbsp; 👤 ${r.driver || 'לא זוהה'} &nbsp; 🕐 ${r.savedAt}</div>
          <div class="ri-files">📁 ${r.folder || ''}<br>${filesDisplay}</div>
          <div class="ri-actions">
            <button class="ri-btn ri-btn-del" onclick="trashReport(${r.id})">🗑️ מחק</button>
          </div>
        </div>`;
      }
    }).join('');
  }

  function trashReport(id) {
    const r = history.find(x => x.id === id);
    if (!r) return;
    if (!confirm(`למחוק את דוח ${r.plate}?\nהקבצים יועברו לסל מחזור.`)) return;
    r.trashed = true;
    saveHistory();
    renderPanel();
  }

  function restoreReport(id) {
    const r = history.find(x => x.id === id);
    if (r) { r.trashed = false; saveHistory(); renderPanel(); }
  }

  function permDelete(id) {
    if (!confirm('מחיקה לצמיתות — לא ניתן לשחזר. להמשיך?')) return;
    history = history.filter(x => x.id !== id);
    saveHistory();
    renderPanel();
  }

  // ===================== OCR WORKER =====================
  const MAX_SIZE = 100 * 1024 * 1024;
  const MAX_OCR_PX = 1400;
  let selectedFiles = [];
  let ocrWorker = null;
  let workerReady = false;
  let ocrProgressCallback = null;

  (async function initWorker() {
    const ws = document.getElementById('workerStatus');
    const loggerFn = m => {
      if (m.status === 'recognizing text' && ocrProgressCallback) ocrProgressCallback(m.progress);
    };
    const BASE = 'https://omer4561.github.io/accident-native/tesseract';
    try {
      ocrWorker = await Tesseract.createWorker('heb', 1, {
        workerPath: BASE + '/worker.min.js',
        corePath:   BASE + '/tesseract-core.wasm.js',
        langPath:   BASE + '/tessdata',
        logger: loggerFn
      });
      workerReady = true;
      ws.textContent = '✅ מנוע זיהוי מוכן';
      ws.className = 'worker-status ready';
      setTimeout(() => ws.style.display = 'none', 2000);
    } catch(e) {
      ws.textContent = `⚠️ OCR לא נטען: ${e.message}`;
      ws.style.color = '#c5221f';
    }
    if (selectedFiles.length > 0) document.getElementById('processBtn').disabled = false;
  })();

  // ===================== FILE SELECTION =====================
  document.getElementById('fileInput').addEventListener('change', function() {
    const newFiles = Array.from(this.files).filter(f =>
      f.size <= MAX_SIZE && (f.type.startsWith('image/') || /\.(jpg|jpeg|png|bmp|heic|webp)$/i.test(f.name))
    );
    selectedFiles = selectedFiles.concat(newFiles);
    this.value = '';
    updateUploadUI();
  });

  function updateUploadUI() {
    const area = document.getElementById('uploadArea');
    const badge = document.getElementById('countBadge');
    const thumbs = document.getElementById('thumbsRow');

    if (!selectedFiles.length) {
      area.className = 'upload-area';
      document.getElementById('uploadLabel').textContent = 'בחר תמונות לעיבוד';
      badge.innerHTML = ''; thumbs.innerHTML = '';
      document.getElementById('processBtn').disabled = true;
      document.getElementById('processBtn').textContent = 'עבד תמונות';
      return;
    }

    area.className = 'upload-area has-files';
    document.getElementById('uploadLabel').textContent = 'הוסף עוד תמונות';
    badge.innerHTML = `<div class="count-badge">✅ ${selectedFiles.length} תמונות נבחרו</div>`;

    const show = selectedFiles.slice(0, 5);
    const extra = selectedFiles.length - 5;
    thumbs.innerHTML = show.map(f => {
      const url = URL.createObjectURL(f);
      return `<div class="thumb-item"><img src="${url}" onload="URL.revokeObjectURL(this.src)"></div>`;
    }).join('') + (extra > 0 ? `<div class="thumb-more">+${extra}</div>` : '');

    document.getElementById('processBtn').disabled = false;
    document.getElementById('processBtn').textContent = `🔍 עבד ${selectedFiles.length} תמונות`;
  }

  // ===================== PARSE FIELDS =====================
  function extractDate(text) {
    const sep = '[\\s]*[/\\.\\-|\\\\lI][\\s]*';
    const curYear = new Date().getFullYear();
    const datePatterns = [
      { rx: new RegExp(`(\\d{1,2})${sep}(\\d{1,2})${sep}(\\d{4})`), type: 'dmy4' },
      { rx: new RegExp(`(\\d{4})${sep}(\\d{1,2})${sep}(\\d{1,2})`), type: 'ymd4' },
      { rx: new RegExp(`(\\d{1,2})${sep}(\\d{1,2})${sep}(\\d{2})(?!\\d)`), type: 'dmy2' },
      { rx: new RegExp(`(\\d{1,2})${sep}(\\d{1,2})(?![\\s]*[/\\.\\-|\\\\lI\\d])`), type: 'dm' },
    ];
    for (const { rx, type } of datePatterns) {
      const m = text.match(rx);
      if (!m) continue;
      let dd, mm, yyyy;
      if (type === 'dmy4') { dd=+m[1]; mm=+m[2]; yyyy=+m[3]; }
      else if (type === 'ymd4') { yyyy=+m[1]; mm=+m[2]; dd=+m[3]; }
      else if (type === 'dmy2') { dd=+m[1]; mm=+m[2]; yyyy=2000+(+m[3]); }
      else { dd=+m[1]; mm=+m[2]; yyyy=curYear; }
      if (mm>=1&&mm<=12&&dd>=1&&dd<=31) {
        return `${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}/${yyyy}`;
      }
    }
    return null;
  }

  function parseFields(text) {
    const data = { date: null, license_plate: null, driver_name: null };

    // --- DATE: חפש קודם ליד המילה "תאריך" או "בתאריך" (כמו שכתוב בטופס הצבאי) ---
    const labeledDateRx = /(?:ב?תאריך)[^\d\n]{0,10}([\d][^\n]{1,20})/gi;
    let labelMatch;
    while ((labelMatch = labeledDateRx.exec(text)) !== null) {
      const candidate = extractDate(labelMatch[1]);
      if (candidate) { data.date = candidate; break; }
    }
    // אם לא נמצא ליד תווית — חפש בכל הטקסט
    if (!data.date) data.date = extractDate(text);
    const pm = text.match(/\b(\d{2,3})\s*[-–]\s*(\d{2,3})\s*[-–]\s*(\d{2,3})\b/) || text.match(/\b(\d{7,8})\b/);
    if (pm) data.license_plate = pm[1].length<=3&&pm[2] ? `${pm[1]}-${pm[2]}-${pm[3]}` : pm[1];
    const nm = text.match(/(?:שם|נהג)[^:\n]*[:\s]+([\u0590-\u05FF][^\n]{1,30})/);
    if (nm) data.driver_name = nm[1].trim();
    return data;
  }

  function buildFilename(data, pageNum, multiPage, ext) {
    const plate = (data.license_plate || 'unknown_plate').replace(/[^a-zA-Z0-9\u0590-\u05FF\-]/g, '_');
    let dateStr = 'no_date';
    if (data.date) { const p = data.date.split('/'); dateStr = `${p[0]}_${p[1]}_${p[2]}`; }
    return `${plate}_${dateStr}${multiPage ? `_עמוד${pageNum}` : ''}${ext}`;
  }

  // ===================== FILE SAVE =====================
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function saveFile(file, filename, folder) {
    const subPath = folder ? `דוחות_תאונה/${folder}/${filename}` : `דוחות_תאונה/${filename}`;

    if (window.Capacitor?.isNativePlatform?.()) {
      const { Filesystem } = window.Capacitor.Plugins;
      try { await Filesystem.requestPermissions(); } catch(e) {}
      const base64 = await fileToBase64(file);
      // EXTERNAL = app-scoped external dir, no MANAGE_EXTERNAL_STORAGE needed
      // Visible in Files → Android → data → com.accidentreporter.app → files
      try {
        await Filesystem.writeFile({ path: subPath, data: base64, directory: 'EXTERNAL', recursive: true });
        return subPath;
      } catch(e) {
        // Fallback to private Documents
        try {
          await Filesystem.writeFile({ path: subPath, data: base64, directory: 'DOCUMENTS', recursive: true });
          return subPath;
        } catch(e2) {
          throw new Error(e2.message);
        }
      }
    }

    // Browser fallback — download
    const url = URL.createObjectURL(file);
    const a = Object.assign(document.createElement('a'), { href: url, download: filename });
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    return filename;
  }

  async function saveGroup(key, btn) {
    const items = window.groupsData[key];
    if (!items) return;
    btn.disabled = true;
    btn.textContent = '⏳ שומר...';

    const merged = items[0].data;
    const date = merged.date;
    let folder = 'ללא_תאריך';
    if (date) {
      const p = date.split('/');
      let yy = p[2] ? parseInt(p[2], 10) : new Date().getFullYear();
      if (yy < 100) yy += 2000;          // 25 → 2025
      const mm = (p[1] || '01').padStart(2, '0');
      folder = `${yy}/${mm}`;            // e.g. 2025/04
    }

    try {
      const savedPaths = await Promise.all(items.map((item, idx) => {
        const ext = '.' + item.file.name.split('.').pop().toLowerCase();
        const filename = buildFilename(merged, idx+1, items.length>1, ext);
        return saveFile(item.file, filename, folder);
      }));

      // Save to history
      addReportToHistory(merged.license_plate, merged.date, merged.driver_name, savedPaths, `דוחות_תאונה/${folder}`);

      btn.textContent = `✅ נשמר`;
      btn.style.background = '#34a853';
      startResetTimer();
    } catch(e) {
      btn.textContent = `❌ ${e.message}`;
      btn.style.background = '#c5221f';
      btn.disabled = false;
    }
  }

  // ===================== OCR PROCESSING =====================
  function setProgress(i, pct, txt) {
    const b = document.getElementById('bar_'+i), s = document.getElementById('status_'+i);
    if (b) b.style.width = pct+'%';
    if (s) s.textContent = txt;
  }

  function resizeForOCR(file) {
    return new Promise(resolve => {
      const img = new Image(), url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, MAX_OCR_PX / Math.max(img.width, img.height));
        const c = document.createElement('canvas');
        c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        c.toBlob(resolve, 'image/jpeg', 0.85);
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
      img.src = url;
    });
  }

  async function startProcessing() {
    if (!selectedFiles.length) return;
    if (!ocrWorker) { alert('מנוע OCR עדיין נטען — נסה שוב'); return; }

    document.getElementById('processBtn').disabled = true;
    document.getElementById('processBtn').textContent = 'מעבד...';
    const pSec = document.getElementById('progressSection');
    const pList = document.getElementById('progressList');
    pSec.classList.add('visible'); pList.innerHTML = '';

    selectedFiles.forEach((file, i) => {
      const row = document.createElement('div');
      row.className = 'file-progress';
      row.innerHTML = `<div class="file-name">${file.name}</div>
        <div class="progress-bar-bg"><div class="progress-bar" id="bar_${i}"></div></div>
        <div class="progress-status" id="status_${i}">ממתין...</div>`;
      pList.appendChild(row);
    });

    const results = [], errors = [];
    try {
      selectedFiles.forEach((_, i) => setProgress(i, 5, 'ממזער...'));
      const resized = await Promise.all(selectedFiles.map(f => resizeForOCR(f)));
      selectedFiles.forEach((_, i) => setProgress(i, 15, 'ממתין לזיהוי...'));

      for (let i = 0; i < resized.length; i++) {
        setProgress(i, 20, 'מזהה טקסט...');
        try {
          ocrProgressCallback = p => setProgress(i, 20+Math.round(p*75), `OCR: ${20+Math.round(p*75)}%`);
          const { data: { text } } = await ocrWorker.recognize(resized[i]);
          ocrProgressCallback = null;
          setProgress(i, 100, '✅ הושלם');
          results.push({ file: selectedFiles[i], data: parseFields(text), index: i, rawText: text });
        } catch(e) {
          ocrProgressCallback = null;
          setProgress(i, 100, '❌ נכשל');
          errors.push({ file: selectedFiles[i], error: e.message });
        }
      }
    } catch(e) { alert('שגיאה: ' + e.message); }

    showResults(results, errors);
    document.getElementById('processBtn').disabled = false;
    document.getElementById('processBtn').textContent = `🔍 עבד ${selectedFiles.length} תמונות`;
  }

  // ===================== SHOW RESULTS =====================
  function showResults(results, errors) {
    const section = document.getElementById('resultsSection');
    const resultsList = document.getElementById('resultsList');
    const errorsList = document.getElementById('errorsList');
    section.classList.add('visible');
    resultsList.innerHTML = ''; errorsList.innerHTML = '';

    document.getElementById('summaryBar').textContent =
      `✅ עובדו ${results.length} קבצים${errors.length ? ` | ❌ ${errors.length} נכשלו` : ''}`;

    let unknownCount = 0;
    const groups = {};
    for (const r of results) {
      const plate = r.data.license_plate || 'unknown';
      const date  = r.data.date || null;
      const key   = date ? `${plate}__${date}` : `${plate}__no_date_${unknownCount++}`;
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    }

    window.groupsData = {};
    for (const [key, items] of Object.entries(groups)) {
      const merged = items.reduce((acc, item) => ({
        date: acc.date || item.data.date,
        license_plate: acc.license_plate || item.data.license_plate,
        driver_name: acc.driver_name || item.data.driver_name
      }), { date: null, license_plate: null, driver_name: null });
      window.groupsData[key] = items.map(item => ({ ...item, data: merged }));
    }

    for (const [key, items] of Object.entries(window.groupsData)) {
      const merged = items[0].data;
      const multiPage = items.length > 1;
      const card = document.createElement('div');
      card.className = 'group-card';

      const rawPreview = (items[0].rawText || '').slice(0, 250).replace(/</g,'&lt;');
      const safeKey = key.replace(/'/g, "\\'");

      let pagesHtml = '';
      items.forEach((item, idx) => {
        const ext = '.' + item.file.name.split('.').pop().toLowerCase();
        const filename = buildFilename(merged, idx+1, multiPage, ext);
        pagesHtml += `<button class="page-btn"
          onclick="saveFile(selectedFiles[${item.index}],'${filename}','').then(()=>{this.textContent='✅ עמוד ${idx+1}'}).catch(e=>{this.textContent='❌'+e.message})">
          💾 עמוד ${idx+1}<br><small style="font-size:10px;opacity:0.8">${filename}</small>
        </button>`;
      });

      card.innerHTML = `
        <div class="group-plate">🚗 ${merged.license_plate || 'לוחית לא זוהתה'}</div>
        <div class="group-meta">
          <span>📅 ${merged.date || 'תאריך לא זוהה'}</span>
          <span>👤 ${merged.driver_name || 'לא זוהה'}</span>
          ${multiPage ? `<span>📄 ${items.length} עמודים</span>` : ''}
        </div>
        <pre style="font-size:10px;background:#f5f5f5;padding:6px;border-radius:6px;margin:6px 0 10px;white-space:pre-wrap;direction:ltr;text-align:left;max-height:100px;overflow-y:auto">${rawPreview}</pre>
        <div class="pages-row">
          <button class="page-btn-all" onclick="saveGroup('${safeKey}', this)">
            💾 שמור הכל${multiPage ? ` (${items.length} עמודים)` : ''}<br>
            <small style="font-size:10px;opacity:0.85">דוחות_תאונה/</small>
          </button>
          ${pagesHtml}
        </div>`;
      resultsList.appendChild(card);
    }

    errors.forEach(e => {
      const div = document.createElement('div');
      div.className = 'error-tag';
      div.textContent = `❌ ${e.file.name}: ${e.error}`;
      errorsList.appendChild(div);
    });

    section.scrollIntoView({ behavior: 'smooth' });
  }
</script>
